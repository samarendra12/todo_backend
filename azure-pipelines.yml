trigger:
- main

pool:
  name: devops-agent-pool

steps:

- task: NodeTool@0
  inputs:
    versionSpec: '16.x'

# 🔍 FIRST check actual files
- script: |
    echo Current Dir:
    echo %CD%
    dir
  displayName: 'Check Files BEFORE INSTALL'

# 📦 Install
- script: |
    npm install
  displayName: 'Install Dependencies'
  workingDirectory: '"$(System.DefaultWorkingDirectory)"'

# 🔍 Check node_modules
- script: |
    dir node_modules
  displayName: 'Check node_modules'

# 🏗️ Build
- script: |
    npm run build
  displayName: 'Build App'
  workingDirectory: '"$(System.DefaultWorkingDirectory)"'